<h1>hola mundo </h1>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Minimalista</title>
    <style>
        /* Estilos Generales */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenedor Principal */
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #2d3436;
        }

        p {
            color: #636e72;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Botón con estilo */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #74b9ff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.3);
        }

        /* Enlaces secundarios */
        .footer-links {
            margin-top: 2rem;
        }

        .footer-links a {
            color: #b2bec3;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: #0984e3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hola, soy [Tu Nombre]</h1>
        <p>Bienvenido a mi espacio digital. Soy creativo, entusiasta de la tecnología y amante del buen diseño.</p>
        
        <a href="#" class="btn">Ver mi trabajo</a>

        <div class="footer-links">
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
            <a href="#">Github</a>
        </div>
    </div>
</body>
</html>
